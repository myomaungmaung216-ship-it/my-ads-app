<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad App</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #f0f2f5; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 80%;
            max-width: 300px;
        }
        .ad-button { 
            background-color: #0088cc; 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            width: 100%;
        }
        .ad-button:active { transform: scale(0.98); }
        #status { margin-top: 20px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <button id="adBtn" class="ad-button">ကြော်ငြာကြည့်မည်</button>
    <div id="status"></div>
</div>

<script>
    // Adsgram Test ID "245" ကို သုံးထားပါတယ်
    const AdController = window.Adsgram.init({ blockId: "245" });
    const btn = document.getElementById('adBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
        status.innerText = '⌛ ကြော်ငြာကို ရှာဖွေနေပါသည်...';
        status.style.color = '#333';
        btn.disabled = true;

        AdController.show().then((result) => {
            status.innerText = '✅ ကြော်ငြာကြည့်တာ အောင်မြင်ပါသည်။';
            status.style.color = 'green';
        }).catch((result) => {
            status.innerText = '❌ မအောင်မြင်ပါ။ နောက်မှ ပြန်ကြိုးစားပါ။';
            status.style.color = 'red';
        }).finally(() => {
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
