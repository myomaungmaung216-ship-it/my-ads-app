<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကြော်ငြာကြည့်ပြီး ဆုယူပါ</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f9; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        h2 { color: #1a73e8; margin-bottom: 15px; }
        p { color: #555; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        .ad-button { background-color: #e67e22; color: white; border: none; padding: 18px 0; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3); transition: 0.2s; }
        .ad-button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h2>ဆုလာဘ်ရယူရန်</h2>
    <p>အောက်ကခလုတ်ကို နှိပ်ပြီး ကြော်ငြာကြည့်ပေးပါ။ ကြော်ငြာကြည့်ပြီးတာနဲ့ သင့်အတွက် ဆုလာဘ်ကို ရရှိပါလိမ့်မယ်။</p>
    
    <button onclick="goToAds()" class="ad-button">ကြော်ငြာကြည့်မည်</button>
</div>

<script>
    function goToAds() {
        // သင့်ရဲ့ Link အသစ်ကို အသုံးပြုထားပါတယ်
        window.location.href = "https://link-target.net/4551603/9L77QPpiDIBX";
    }
</script>

</body>
</html>
