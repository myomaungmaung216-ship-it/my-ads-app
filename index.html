<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad App</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .ad-button { background-color: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <button id="adBtn" class="ad-button">ကြော်ငြာကြည့်မည်</button>
    <div id="status"></div>
</div>

<script>
    const AdController = window.Adsgram.init({ blockId: "245" });
    const btn = document.getElementById('adBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
        status.innerText = '⌛ စောင့်ဆိုင်းပေးပါ...';
        btn.disabled = true;
        AdController.show().then(() => {
            status.innerText = '✅ အောင်မြင်ပါသည်။';
            status.style.color = 'green';
        }).catch(() => {
            status.innerText = '❌ မအောင်မြင်ပါ။';
            status.style.color = 'red';
        }).finally(() => {
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
