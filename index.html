<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Reward</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 90%; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        .btn { background: linear-gradient(135deg, #ff9d00, #f44336); color: white; border: none; padding: 18px 0; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 5px 15px rgba(255, 157, 0, 0.4); transition: 0.3s; }
        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="container">
    <h1>ဆုလာဘ်ရယူရန်</h1>
    <p>ကြော်ငြာကြည့်ရန် အောက်ကခလုတ်ကို နှိပ်ပါ။ ကြော်ငြာပြီးဆုံးပါက ဆုလာဘ်ကို ရရှိပါလိမ့်မည်။</p>
    
    <button onclick="goToAd()" class="btn">ကြော်ငြာကြည့်မည်</button>
</div>

<script>
    function goToAd() {
        // သင့်ရဲ့ Monetag Direct Link
        var adUrl = "https://omg10.com/4/10785178";
        
        // ကြော်ငြာကို Tab အသစ်နဲ့ ဖွင့်ပေးမယ်
        window.open(adUrl, '_blank');
        
        // မူရင်းစာမျက်နှာမှာ စာသားပြောင်းပေးမယ်
        document.querySelector('p').innerHTML = "ကြော်ငြာကြည့်နေပါသည်။ ခဏစောင့်ပေးပါ။ ✅";
    }
</script>

</body>
</html>
