<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTH ADGRAM - Accurate Mining</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .score-box { background: #e1f5fe; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #b3e5fc; }
        .points-text { font-size: 45px; font-weight: bold; color: #0277bd; }
        .withdraw-section { border-top: 1px solid #eee; padding-top: 20px; text-align: left; }
        label { font-size: 13px; color: #555; font-weight: bold; margin-left: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 8px 0 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 14px; }
        .min-text { font-size: 11px; color: #d32f2f; margin-bottom: 15px; font-weight: bold; margin-left: 5px; display: block; }
        .ton-info { background: #fff9c4; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 14px; color: #f57f17; font-weight: bold; border: 1px solid #fff176; }
        .btn-withdraw { background: #0088cc; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .status-note { font-size: 11px; color: #4caf50; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#333; margin-bottom:5px;">MTH ADGRAM</h2>
    <p class="status-note">● Mining Active (1 Point / 1 Min)</p>

    <div class="score-box">
        <div style="font-size:14px; color:#546e7a; margin-bottom:5px;">TOTAL BALANCE</div>
        <div id="pointsDisplay" class="points-text">0</div>
        <div style="font-size:12px; color:#0277bd;">Points</div>
    </div>

    <div class="withdraw-section">
        <label>Withdraw Amount</label>
        <input type="number" id="amount" placeholder="Min: 1" oninput="calculateTon()">
        <span class="min-text">* Minimum withdrawal: 1 Coin</span>

        <div id="tonResult" class="ton-info">Receive: 0.000000 TON</div>

        <label>TONkeeper Address</label>
        <input type="text" id="address" placeholder="UQ... or EQ...">

        <label>Comment / Memo</label>
        <input type="text" id="memo" placeholder="Optional">

        <button class="btn-withdraw" onclick="sendWithdraw()">Withdraw Now</button>
    </div>
</div>

<script>
    // Point နှင့် အချိန်ကို တိတိကျကျ တွက်ချက်ခြင်း
    let points = parseFloat(localStorage.getItem('mth_precise_points')) || 0;
    let lastTime = parseInt(localStorage.getItem('mth_precise_time')) || Date.now();

    // App ပြန်ဖွင့်ချိန်မှာ ကြားထဲကအချိန်အတွက် အမှတ်ပေါင်းပေးခြင်း
    const currentTime = Date.now();
    const timeDiffMinutes = (currentTime - lastTime) / 60000;
    
    if (timeDiffMinutes >= 1) {
        points += Math.floor(timeDiffMinutes);
        lastTime = currentTime - (timeDiffMinutes % 1 * 60000); // ကျန်နေတဲ့ စက္ကန့်ကို နောက်အတွက် သိမ်းထားရန်
    }

    updateUI();

    // App ဖွင့်ထားစဉ် ၁ မိနစ် (60000ms) ပြည့်မှ ၁ မှတ် တိုးစေရန်
    setInterval(() => {
        points++;
        lastTime = Date.now();
        updateUI();
        saveData();
    }, 60000);

    function updateUI() {
        document.getElementById('pointsDisplay').innerText = Math.floor(points);
    }

    function saveData() {
        localStorage.setItem('mth_precise_points', points);
        localStorage.setItem('mth_precise_time', lastTime);
    }

    // App ပိတ်သွားလျှင်လည်း အချိန်မှတ်ထားရန်
    window.addEventListener("beforeunload", saveData);

    function calculateTon() {
        const inputAmount = document.getElementById('amount').value || 0;
        const tonValue = (inputAmount * 0.000001).toFixed(6);
        document.getElementById('tonResult').innerText = `Receive: ${tonValue} TON`;
    }

    function sendWithdraw() {
        const amountVal = document.getElementById('amount').value;
        const addressVal = document.getElementById('address').value;
        const memoVal = document.getElementById('memo').value || "No Memo";
        const tonVal = (amountVal * 0.000001).toFixed(6);

        if (!amountVal || !addressVal) { alert("Please fill in all fields."); return; }
        if (parseInt(amountVal) < 1) { alert("Minimum withdrawal is 1 Coin."); return; }
        if (parseInt(amountVal) > points) { alert("Insufficient balance."); return; }

        const botToken = "8766591679:AAHBE-pi5Ce1wDI215gss-tHmyAuurv_TmY";
        const chatId = "5677294498";
        const message = `📥 *New Withdrawal*\n\n💰 Points: ${amountVal}\n💎 TON: ${tonVal}\n🏦 Address: \`${addressVal}\` \n📝 Memo: ${memoVal}`;

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`)
        .then(res => {
            if (res.ok) {
                alert("Withdrawal request sent!");
                points -= parseInt(amountVal);
                saveData();
                updateUI();
            }
        });
    }
</script>

</body>
</html>
