<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Points</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 320px; }
        .info-box { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .label { font-size: 14px; color: #666; display: block; margin-bottom: 5px; }
        .value { font-size: 32px; font-weight: bold; color: #0388cc; }
        .btn { background-color: #0388cc; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="info-box">
        <span class="label">ဆော့ကစားချိန်</span>
        <span id="timer" class="value">00:00</span>
    </div>
    
    <div class="info-box">
        <span class="label">ရရှိထားသော အမှတ်</span>
        <span id="points" class="value">0</span>
    </div>

    <button class="btn" onclick="alert('Admin ကို ဆက်သွယ်ပြီး ဆုလာဘ်လဲလှယ်ပါ')">ဆုလာဘ်ထုတ်ယူမည်</button>
</div>

<script>
    let seconds = 0;
    let points = parseInt(localStorage.getItem('myAppPoints')) || 0;
    document.getElementById('points').innerText = points;

    // အချိန်မှတ်ပြီး အမှတ်တိုးပေးမည့်စနစ်
    setInterval(() => {
        seconds++;
        
        // အချိန်ပြောင်းလဲခြင်း (MM:SS)
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        document.getElementById('timer').innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);

        // စက္ကန့် ၃၀ ပြည့်တိုင်း ၁ မှတ် ပေးမယ် (စိတ်ကြိုက်ပြင်နိုင်သည်)
        if (seconds % 30 === 0) {
            points++;
            document.getElementById('points').innerText = points;
            localStorage.setItem('myAppPoints', points);
        }
    }, 1000);
</script>

</body>
</html>
