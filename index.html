<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTH ADGRAM - Reward App</title>
    
    <script src="https://sdk.honeygain.com/static/js/sdk.js"></script>

    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 350px; }
        .info-box { background: #f8f9fa; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
        .value { font-size: 28px; font-weight: bold; color: #0388cc; }
        .btn { background: #0388cc; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">MTH ADGRAM</h2>
    
    <div class="info-box">
        <span class="label">ယနေ့ဆော့ကစားချိန်</span>
        <span id="timer" class="value">00:00</span>
    </div>
    
    <div class="info-box">
        <span class="label">ရရှိထားသော အမှတ်</span>
        <span id="points" class="value">0</span>
    </div>

    <button class="btn" onclick="openAd()">ကြော်ငြာကြည့်မည်</button>
    <p style="font-size: 11px; color: #999; margin-top: 15px;">App ကို ဖွင့်ထားချိန် စက္ကန့် ၃၀ တိုင်း ၁ မှတ် တိုးပါမည်။</p>
</div>

<script>
    // Honeygain အလုပ်လုပ်အောင် စတင်ခြင်း
    // အောက်က 'YOUR_API_KEY' နေရာမှာ Honeygain ကပေးတဲ့ Key ကို ထည့်ပါ
    Honeygain.init({
        apiKey: 'YOUR_API_KEY_HERE', 
    });

    let seconds = 0;
    let points = parseInt(localStorage.getItem('mth_points')) || 0;
    document.getElementById('points').innerText = points;

    // Timer နှင့် အမှတ်တိုးပေးသည့်စနစ်
    setInterval(() => {
        seconds++;
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        document.getElementById('timer').innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);

        if (seconds % 30 === 0) {
            points++;
            document.getElementById('points').innerText = points;
            localStorage.setItem('mth_points', points);
        }
    }, 1000);

    function openAd() {
        window.open("https://omg10.com/4/10787745", "_blank");
    }
</script>

</body>
</html>
