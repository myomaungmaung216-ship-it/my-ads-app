<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad App</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .ad-button { background-color: #0388cc; color: white; border: none; padding: 16px 20px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .ad-button:disabled { background-color: #ccc; cursor: not-allowed; }
        .counter-box { font-size: 18px; color: #333; margin-bottom: 20px; padding: 15px; background: #eef7ff; border: 2px solid #0388cc; border-radius: 15px; }
        #adCount { font-weight: bold; color: #0388cc; font-size: 24px; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="counter-box">
        ကြည့်ပြီးသည့်အကြိမ်<br>
        <span id="adCount">0</span> ကြိမ်
    </div>
    <button id="adBtn" class="ad-button">ကြော်ငြာကြည့်မည်</button>
    <div id="status"></div>
</div>

<script>
    const btn = document.getElementById('adBtn');
    const status = document.getElementById('status');
    const adCountDisplay = document.getElementById('adCount');

    let count = 0;

    btn.addEventListener('click', () => {
        status.innerText = "⌛ ကြော်ငြာ ရှာဖွေနေပါသည်...";
        status.style.color = '#333';
        btn.disabled = true;

        // Adsterra Link
        const adLink = "https://www.profitablecpmratenetwork.com/h50je0pquw?key=37802b0758da1c68241394088c16e4a2";

        // Link ကို အသစ်ဖွင့်မယ်
        const newWindow = window.open(adLink, '_blank');

        if (newWindow) {
            // ၁ စက္ကန့်အကြာမှာ status ပြောင်းပြီး count တိုးမယ်
            setTimeout(() => {
                count++;
                adCountDisplay.innerText = count;
                status.innerText = "✅ ကြော်ငြာကြည့်တာ အောင်မြင်ပါသည်";
                status.style.color = 'green';
                btn.disabled = false;
            }, 1000);
        } else {
            // Pop-up ပိတ်ထားရင် ပြမယ့်စာ
            status.innerText = "⚠️ Pop-up Block ဖြစ်နေပါသည်၊ ခွင့်ပြုပေးပါ။";
            status.style.color = 'orange';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
