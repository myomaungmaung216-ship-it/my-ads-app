<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad App</title>
    <script src='https://libtl.com/sdk.js' data-zone='10761454' data-sdk='show_10761454'></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 320px;
        }
        .ad-button {
            background-color: #0388cc;
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .ad-button:active { transform: scale(0.95); }
        .counter-box {
            margin-top: 15px;
            font-size: 16px;
            color: #555;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; min-height: 20px; }
        #adCount { font-weight: bold; color: #0388cc; font-size: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="counter-box">
        ကြည့်ပြီးသည့်အကြိမ် - <span id="adCount">0</span>
    </div>
    <br>
    <button id="adBtn" class="ad-button">ကြော်ငြာကြည့်မည်</button>
    <div id="status"></div>
</div>

<script>
    const btn = document.getElementById('adBtn');
    const status = document.getElementById('status');
    const adCountDisplay = document.getElementById('adCount');
    
    // ဖုန်းထဲမှာ သိမ်းထားတဲ့ အရေအတွက်ကို ပြန်ခေါ်တာပါ
    let count = localStorage.getItem('myAdCount') || 0;
    adCountDisplay.innerText = count;

    btn.addEventListener('click', () => {
        status.innerText = '⌛ ကြော်ငြာ ရှာဖွေနေပါသည်...';
        status.style.color = '#333';
        
        if (typeof show_10761454 === 'function') {
            // ကြော်ငြာကို စဖွင့်ပါတယ်
            show_10761454().then(() => {
                // ကြော်ငြာကို ဆုံးအောင်ကြည့်မှသာ ဒီအပိုင်းကို ရောက်မှာပါ
                count++;
                localStorage.setItem('myAdCount', count); // ဖုန်းထဲမှာ သိမ်းလိုက်ပြီ
                adCountDisplay.innerText = count;
                
                status.innerText = '✅ ကြော်ငြာကြည့်တာ အောင်မြင်ပါသည်။';
                status.style.color = 'green';
            }).catch((err) => {
                // ကြော်ငြာကို အလယ်မှာ ပိတ်လိုက်ရင် သို့မဟုတ် အမှားတက်ရင်
                status.innerText = '❌ ကြော်ငြာကို ဆုံးအောင် ကြည့်ပေးပါ။';
                status.style.color = 'red';
            });
        } else {
            status.innerText = '❌ SDK မတက်သေးပါ။ ခဏနေမှ ပြန်နှိပ်ပါ။';
            status.style.color = 'orange';
        }
    });
</script>

</body>
</html>
